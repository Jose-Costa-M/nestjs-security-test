name: "Security · Dependencies"

on:
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  npm-audit:
    name: "npm audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=critical
